name: C/C++ CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install dependencies
      run: sudo apt-get install build-essential autoconf automake bison flex gawk libtool libtool-bin libncurses-dev curl file git gperf help2man texinfo unzip wget pkg-config libarchive-dev cmake libgtk2.0-dev
    - name: get the toolchain
      run: git clone https://github.com/koreader/koxtoolchain.git && pushd koxtoolchain && ./gen-tc.sh kindlehf && popd
    - name: get the sdk
      run: git clone --recursive --depth=1 https://github.com/KindleModding/kindle-sdk.git && pushd kindle-sdk && chmod +x ./gen-sdk.sh && ./gen-sdk.sh kindlehf && popd
    - name: build the thang
      run: mkdir build && cd build && cmake .. -DPUZZLES_GTK_VERSION=2 -DCMAKE_TOOLCHAIN_FILE=$PWD/armhf-toolchain.cmake && make
